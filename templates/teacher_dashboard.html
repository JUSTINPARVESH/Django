<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #001f3f, #0074D9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #001f3f;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Teacher Dashboard 👨‍🏫</h2>
    <p>Welcome back, <strong>{{ request.user.email }}</strong>!</p>
    <p>You have successfully logged in as a Teacher.</p>
    <br>
    <i>(Teacher features like managing students and courses will appear here)</i>
    
    <a href="/api/custom-login/" class="btn">Back to Login</a>
</div>

</body>
</html>
