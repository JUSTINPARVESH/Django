<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #001f3f, #0074D9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0074D9;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #005bb5;
        }

        .links {
            margin-top: 15px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        a {
            color: #0074D9;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login 🔐</h2>

    {% if error %}
        <p style="color:red; text-align: center;">{{ error }}</p>
    {% endif %}

    {% if messages %}
        {% for message in messages %}
            <p style="color:green; text-align: center;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a href="/api/password-reset/">Forgot Password?</a>
        <a href="/api/register-page/">Create Account</a>
    </div>

</div>

</body>
</html>
