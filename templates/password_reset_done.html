<!DOCTYPE html>
<html>
<head>
    <title>Email Sent</title>
    <style>
        body { font-family: Arial; background: linear-gradient(to right, #001f3f, #0074D9); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); }
        .btn { display: inline-block; width: 100%; padding: 10px; margin-top: 20px; background: #0074D9; color: white; border: none; cursor: pointer; border-radius: 5px; box-sizing: border-box; text-decoration: none;}
        .btn:hover { background: #005bb5; }
        p { font-size: 15px; line-height: 1.5; margin: 15px 0; }
    </style>
</head>
<body>
<div class="box">
    <h2>Check Your Email 📬</h2>
    <p>We've emailed you instructions for setting your password. You should receive them shortly.</p>
    <p style="font-size: 12px; color: gray;">If you don't receive an email, please make sure you've entered the address you registered with.</p>
    <a href="/api/custom-login/" class="btn">Back to Login</a>
</div>
</body>
</html>
