<!DOCTYPE html>
<html>
<head>
    <title>Password Reset Complete</title>
    <style>
        body { font-family: Arial; background: linear-gradient(to right, #001f3f, #0074D9); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); }
        .btn { display: inline-block; width: 100%; padding: 10px; margin-top: 20px; background: #0074D9; color: white; text-decoration: none; border-radius: 5px; box-sizing: border-box; }
        .btn:hover { background: #005bb5; }
        h2 { color: #001f3f; }
        p { font-size: 15px; }
    </style>
</head>
<body>
<div class="box">
    <h2>Success! ✅</h2>
    <p>Your password has been successfully reset.</p>
    <p>You can now log in with your new password.</p>
    
    <a href="/api/custom-login/" class="btn">Log in now</a>
</div>
</body>
</html>
