<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <style>
        body { font-family: Arial; background: linear-gradient(to right, #001f3f, #0074D9); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0074D9; color: white; border: none; cursor: pointer; margin-top: 10px; border-radius: 5px; }
        button:hover { background: #005bb5; }
        ul { list-style: none; padding: 0; text-align: left; font-size: 14px; margin-bottom: 15px; }
        .helptext { display: block; font-size: 12px; color: gray; text-align: left; margin-bottom: 10px; }
        p {text-align: left; margin: 5px 0;}
    </style>
</head>
<body>
<div class="box">
    <h2>Secure Password 🔐</h2>
    {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Change Password</button>
        </form>
    {% else %}
        <p style="color: red; text-align: center;">Password reset link is invalid or has expired.</p>
        <a href="/api/password-reset/" style="color: #0074D9; text-decoration: none; display: block; text-align: center; margin-top: 15px;">Request a new link</a>
    {% endif %}
</div>
</body>
</html>
